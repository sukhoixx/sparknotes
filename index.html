<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RedNote Kids</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #ff2442;
      --red-light: #ff6b7a;
      --red-pale: #fff0f2;
      --gray: #f5f5f5;
      --text: #1a1a1a;
      --muted: #999;
      --white: #fff;
      --radius: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
    }

    /* ── Header ── */
    .header {
      background: var(--white);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 12px 16px 0;
      box-shadow: 0 1px 8px rgba(0,0,0,.06);
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 20px;
      font-weight: 800;
      color: var(--red);
      text-decoration: none;
      white-space: nowrap;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--red);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .search-bar {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--gray);
      border-radius: 20px;
      padding: 8px 14px;
      gap: 6px;
      border: none;
      font-size: 14px;
      color: var(--muted);
      cursor: text;
    }

    .search-bar span { font-size: 16px; }

    .notif-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--gray);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      position: relative;
    }

    .notif-dot {
      position: absolute;
      top: 4px; right: 4px;
      width: 8px; height: 8px;
      background: var(--red);
      border-radius: 50%;
      border: 1.5px solid #fff;
    }

    /* ── Category tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 12px;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 6px 16px;
      border-radius: 20px;
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
    }

    .tab.active {
      background: var(--red);
      color: var(--white);
      font-weight: 700;
    }

    /* ── Story banner ── */
    .story-row {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--white);
      margin-bottom: 6px;
    }
    .story-row::-webkit-scrollbar { display: none; }

    .story {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    .story-ring {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      padding: 2.5px;
      background: linear-gradient(45deg, var(--red), #ff9a00);
    }

    .story-ring.seen {
      background: #ddd;
    }

    .story-avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      overflow: hidden;
    }

    .story-label {
      font-size: 11px;
      color: var(--text);
      text-align: center;
      max-width: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Feed grid ── */
    .feed {
      columns: 2;
      column-gap: 8px;
      padding: 6px 8px 80px;
    }

    .card {
      break-inside: avoid;
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 8px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .card:active { transform: scale(.97); }

    .card-img {
      width: 100%;
      aspect-ratio: 1 / 1.05;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      position: relative;
    }

    .card-img .badge {
      position: absolute;
      top: 8px; left: 8px;
      background: rgba(0,0,0,.45);
      color: #fff;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
      backdrop-filter: blur(4px);
    }

    .card-body { padding: 8px 10px 10px; }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }

    .card-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    .card-author {
      font-size: 11px;
      color: var(--muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-likes {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: var(--muted);
    }

    .heart-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      transition: transform .15s;
    }

    .heart-btn.liked { animation: pop .25s ease; }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    /* ── Lazy load ── */
    .card { opacity: 0; animation: fadeIn .35s ease forwards; }
    @keyframes fadeIn { to { opacity: 1; } }

    .card-skeleton {
      break-inside: avoid;
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 8px;
    }

    .skel-img {
      width: 100%;
      aspect-ratio: 1 / 1.05;
      background: #e8e8e8;
    }

    .skel-body { padding: 8px 10px 12px; }

    .skel-line {
      border-radius: 6px;
      background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }

    .skel-line.tall  { height: 12px; margin-bottom: 6px; }
    .skel-line.short { height: 12px; width: 65%; margin-bottom: 10px; }
    .skel-line.meta  { height: 10px; width: 50%; }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    #loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid #eee;
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #sentinel { height: 1px; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--white);
      display: flex;
      border-top: 1px solid #eee;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0 6px;
      cursor: pointer;
      border: none;
      background: none;
      gap: 2px;
    }

    .nav-icon { font-size: 22px; }
    .nav-label { font-size: 10px; color: var(--muted); font-weight: 500; }
    .nav-item.active .nav-label { color: var(--red); }
    .nav-item.active .nav-icon { filter: none; }

    .post-btn {
      width: 44px;
      height: 30px;
      background: linear-gradient(135deg, var(--red), #ff6b7a);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #fff;
      border: none;
      cursor: pointer;
      margin-top: 2px;
    }

    /* ── Article modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      display: none;
      align-items: flex-end;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--white);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      max-height: 88vh;
      overflow-y: auto;
      animation: slideUp .3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-handle {
      width: 40px; height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .modal-hero {
      width: 100%;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 90px;
      margin-top: 12px;
      border-radius: 16px;
      overflow: hidden;
      margin: 12px 16px 0;
      width: calc(100% - 32px);
    }

    .modal-content { padding: 16px; }

    .modal-tag {
      display: inline-block;
      background: var(--red-pale);
      color: var(--red);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .ai-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: linear-gradient(135deg, #6c47ff, #00b4d8);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 10px;
      margin-bottom: 14px;
    }

    .modal-body {
      font-size: 15px;
      line-height: 1.7;
      color: #333;
      margin-bottom: 16px;
    }

    .modal-body p { margin-bottom: 12px; }

    .fun-fact {
      background: var(--red-pale);
      border-left: 3px solid var(--red);
      border-radius: 0 10px 10px 0;
      padding: 10px 14px;
      margin: 14px 0;
      font-size: 14px;
    }

    .fun-fact strong { color: var(--red); }

    .tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }

    .tag {
      background: var(--gray);
      color: #555;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
    }

    .modal-author-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 0;
      border-top: 1px solid #f0f0f0;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 12px;
    }

    .modal-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .modal-author-info { flex: 1; }
    .modal-author-name { font-size: 14px; font-weight: 700; }
    .modal-author-sub { font-size: 12px; color: var(--muted); }

    .follow-btn {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .modal-actions {
      display: flex;
      justify-content: space-around;
      padding: 8px 0 16px;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      color: var(--muted);
    }

    .action-btn span:first-child { font-size: 24px; }

    .close-btn {
      position: absolute;
      top: 60px; right: 16px;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(0,0,0,.35);
      border: none;
      color: #fff;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>

  row.innerHTML = stories.map(s => `

        <div class="story-avatar" style="background:${s.bg}">${s.emoji}</div>
      </div>
      <span class="story-label">${s.label}</span>
    </div>
  `).join('');
}

          <div class="card-likes">

              onclick="toggleLike(event,${a.id})">${liked.has(a.id) ? '❤️' : '🤍'}</button>

function generateBatch(cat, count = 4) {
  const pool = cat === 'all' ? MORE_POOL : MORE_POOL.filter(t => t.cat === cat);
  if (pool.length === 0) return [];
  const batch = [];
  for (let i = 0; i < count; i++) {
    const template = pool[poolIndex % pool.length];
    poolIndex++;
    const id = ++nextId;
    batch.push({
      ...template,
      id,
      likes: Math.floor(Math.random() * 12000) + 500,
      comments: Math.floor(Math.random() * 800) + 20,
      time: ['just now','1h ago','2h ago','3h ago','5h ago','8h ago'][Math.floor(Math.random()*6)],
    });
    articles.push(batch[batch.length - 1]);   // register so modal works
  }
  return batch;
}

// Show skeletons, then replace with real cards after delay
async function loadMoreCards() {
  if (isLoading) return;
  isLoading = true;
  const feed = document.getElementById('feed');
  const loader = document.getElementById('loader');
  loader.style.display = 'flex';

  // Insert 4 skeleton placeholders
  const skelContainer = document.createElement('div');
  skelContainer.id = 'skeletons';
  skelContainer.style.cssText = 'columns:2;column-gap:8px;padding:0 8px';
  skelContainer.innerHTML = Array(4).fill(skeletonHTML()).join('');
  feed.parentNode.insertBefore(skelContainer, loader);

  await new Promise(r => setTimeout(r, 750));

  const batch = generateBatch(currentCat, 4);
  skelContainer.remove();
  loader.style.display = 'none';

  if (batch.length) {
    const frag = document.createElement('div');
    frag.innerHTML = batch.map(cardHTML).join('');
    while (frag.firstChild) feed.appendChild(frag.firstChild);
  }

  isLoading = false;
}

function formatNum(n) {
  return n >= 1000 ? (n/1000).toFixed(1) + 'k' : n;
}

// ── Toggle like ───────────────────────────────────────────────────────────────
function toggleLike(e, id) {
  e.stopPropagation();
  const article = articles.find(a => a.id === id);
  if (liked.has(id)) {
    liked.delete(id);
  } else {
    liked.add(id);
    e.currentTarget.classList.add('liked');
  }
  renderFeed(currentCat);
}

// ── Open article modal ────────────────────────────────────────────────────────
function openArticle(id) {
  const a = articles.find(x => x.id === id);
  const overlay = document.getElementById('modalOverlay');
  const body = document.getElementById('modalBody');

  body.innerHTML = `
    <div class="modal-hero" style="background:${a.bg}">${a.emoji}</div>
    <div class="modal-content">
      <span class="modal-tag">${a.badge}</span>
      <h1 class="modal-title">${a.title}</h1>
      <span class="ai-badge">✨ AI Summary for Kids</span>
      <div class="modal-body">
        ${a.body}
        <div class="fun-fact">${a.funFact}</div>
      </div>
      <div class="tags-row">${a.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <div class="modal-author-row">
        <div class="modal-avatar" style="background:${a.authorBg}">${a.authorEmoji}</div>
        <div class="modal-author-info">
          <div class="modal-author-name">${a.author}</div>
          <div class="modal-author-sub">${a.time} · AI-verified</div>
        </div>
        <button class="follow-btn">Follow</button>
      </div>
      <div class="modal-actions">
        <button class="action-btn" onclick="toggleLike2(${a.id})">
          <span id="modal-heart-${a.id}">${liked.has(a.id) ? '❤️' : '🤍'}</span>
          <span>${formatNum(a.likes + (liked.has(a.id) ? 1 : 0))}</span>
        </button>
        <button class="action-btn">
          <span>💬</span><span>${formatNum(a.comments)}</span>
        </button>
        <button class="action-btn">
          <span>🔖</span><span>Save</span>
        </button>
        <button class="action-btn">
          <span>📤</span><span>Share</span>
        </button>
      </div>
    </div>
  `;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function toggleLike2(id) {
  const article = articles.find(a => a.id === id);
  if (liked.has(id)) { liked.delete(id); } else { liked.add(id); }
  document.getElementById('modal-heart-' + id).textContent = liked.has(id) ? '❤️' : '🤍';
  renderFeed(currentCat);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── Tabs ──────────────────────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', function(e) {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderFeed(btn.dataset.cat);
});

// ── Nav items ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', function() {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    this.classList.add('active');
  });
});

// ── Infinite scroll via IntersectionObserver ──────────────────────────────────
const sentinel = document.getElementById('sentinel');
const observer = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) loadMoreCards();
}, { rootMargin: '200px' });
observer.observe(sentinel);

// ── Init ──────────────────────────────────────────────────────────────────────
renderStories();
renderFeed('all');
</script>
